function fuzzyMatch(raw) {
  const q = raw.toLowerCase().trim().replace(/['']/g, "'");
  for (const item of DB) {
    for (const k of item.k) {
      if (q === k || q.includes(k) || k.includes(q)) {
        return { name: raw, calories: item.c, protein: item.p, carbs: item.cb, fat: item.f, serving: item.s };
      }
    }
  }
  const words = q.split(/\s+/).filter(w => w.length > 2);
  let best = null, bestScore = 0;
  for (const item of DB) {
    for (const k of item.k) {
      const kw = k.split(/\s+/);
      let score = 0;
      for (const w of words) { if (kw.some(x => x.includes(w) || w.includes(x))) score++; }
      const pct = score / Math.max(words.length, 1);
      if (pct > bestScore && pct >= 0.4) { bestScore = pct; best = item; }
    }
  }
  if (best) return { name: raw, calories: best.c, protein: best.p, carbs: best.cb, fat: best.f, serving: best.s };
  return null;
}

function getVerdict(macros, remaining, mealsLeft) {
  if (macros.calories > remaining.calories + 100) {
    return { verdict: "NO", reasoning: `That's ${macros.calories} cal but you only have ${Math.round(remaining.calories)} left. You'd blow past your target.`, suggestion: "Go lighter — grilled chicken, a protein shake, or a salad with lean protein." };
  }
  const calPct = macros.calories / (remaining.calories || 1);
  if (mealsLeft > 1 && calPct > 0.7) {
    return { verdict: "MODIFY", reasoning: `${macros.calories} cal is ${Math.round(calPct * 100)}% of what you have left with ${mealsLeft} meals to go. You'll be starving later.`, suggestion: `Cut portion by a third or go leaner. Aim for ~${Math.round(remaining.calories / mealsLeft)} cal per remaining meal.` };
  }
  const pRatio = macros.protein / (macros.calories || 1);
  if (pRatio < 0.04 && remaining.protein > 50) {
    return { verdict: "MODIFY", reasoning: `Only ${macros.protein}g protein for ${macros.calories} cal — bad ratio. You still need ${Math.round(remaining.protein)}g protein today.`, suggestion: "Add protein or swap. Grilled chicken, fish, or add a shake on the side." };
  }
  const pNote = macros.protein >= 30 ? "Solid protein." : "Protein is moderate — load up your other meals.";
  return { verdict: "YES", reasoning: `${macros.calories} cal fits your ${Math.round(remaining.calories)} remaining. ${pNote}`, suggestion: "" };
}

// Helper: load from localStorage with daily reset
function loadToday(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return fallback;
    const { date, data } = JSON.parse(raw);
    if (date !== new Date().toDateString()) return fallback; // new day = reset
    return data;
  } catch { return fallback; }
}
function saveToday(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ date: new Date().toDateString(), data })); } catch {}
}
function loadPersist(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}

function NutritionTracker() {
  const [logged, setLogged] = useState(() => loadToday('lo_logged', []));
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [resp, setResp] = useState(null);
  const [pending, setPending] = useState(null);
  const [hour, setHour] = useState(new Date().getHours());
  const [phase, setPhase] = useState(() => loadPersist('lo_phase', 'weeks1_6'));
  const [suggestions, setSuggestions] = useState(null);
  const [sugLoading, setSugLoading] = useState(false);
  const [requestedFoods, setRequestedFoods] = useState(() => loadPersist('lo_requests', []));
  const [requestInput, setRequestInput] = useState("");
  const [showRequest, setShowRequest] = useState(false);
  const ref = useRef(null);

  // Persist food log (resets daily)
  useEffect(() => { saveToday('lo_logged', logged); }, [logged]);
  // Persist phase selection
  useEffect(() => { try { localStorage.setItem('lo_phase', JSON.stringify(phase)); } catch {} }, [phase]);
  // Persist food requests
  useEffect(() => { try { localStorage.setItem('lo_requests', JSON.stringify(requestedFoods)); } catch {} }, [requestedFoods]);

  useEffect(() => { const t = setInterval(() => setHour(new Date().getHours()), 60000); return () => clearInterval(t); }, []);

  const totals = logged.reduce((a, f) => ({ calories: a.calories + f.calories, protein: a.protein + f.protein, carbs: a.carbs + f.carbs, fat: a.fat + f.fat }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
  const targets = { ...BASE_TARGETS, calories: PHASE_INFO[phase].calories };
  const remaining = { calories: Math.max(0, targets.calories - totals.calories), protein: Math.max(0, targets.protein - totals.protein), carbs: Math.max(0, targets.carbs - totals.carbs), fat: Math.max(0, targets.fat - totals.fat) };
  const mwi = hour < 9 ? 0 : hour < 13 ? 1 : hour < 16 ? 2 : hour < 20 ? 3 : 4;
  const mealsLeft = MEAL_WINDOWS.length - mwi;

  const analyze = async () => {
    if (!input.trim()) return;
    setLoading(true); setResp(null); setPending(null);

    // Check local DB first for consistent, instant results
    const match = fuzzyMatch(input.trim());
    if (match) {
      const macros = { calories: match.calories, protein: match.protein, carbs: match.carbs, fat: match.fat };
      const v = getVerdict(macros, remaining, mealsLeft);
      const r = { verdict: v.verdict, food_name: match.name.charAt(0).toUpperCase() + match.name.slice(1), estimated_macros: macros, serving_size: match.serving, reasoning: v.reasoning, suggestion: v.suggestion };
      setResp(r); setPending(r); setLoading(false); return;
    }

    // Not in DB — use AI for everything else
    const mw = MEAL_WINDOWS[mwi];
    const prompt = `You are a sports nutrition AI for a 6'1" 264lb former D1 defensive tackle cutting to ~235 over 12 weeks while preserving muscle. He's in ${PHASE_INFO[phase].label}.

CURRENT MEAL WINDOW: ${mw.name} — ${mw.desc}
MEALS REMAINING TODAY: ${mealsLeft}
TODAY SO FAR: ${logged.length === 0 ? "Nothing logged" : logged.map(f => f.name + ": " + f.calories + "cal/" + f.protein + "gP/" + f.carbs + "gC/" + f.fat + "gF").join("; ")}
REMAINING: ${remaining.calories} cal / ${remaining.protein}g P / ${remaining.carbs}g C / ${remaining.fat}g F

FOOD: "${input.trim()}"

IMPORTANT: Pay close attention to quantities. "a cannoli" = 1 cannoli. "two cannoli" = 2. "three eggs" = 3. Always respect the exact quantity stated. If no quantity given, assume a single standard serving for a large athletic male.

Estimate macros for literally ANY food input — restaurant items, homemade, brand names, vague descriptions, desserts, snacks, drinks, anything. Use real published nutrition data for branded items. Estimate generously for a large 264lb athletic male. Never refuse. Never ask for clarification.

Respond ONLY with valid JSON, no markdown, no backticks:
{"verdict":"YES or NO or MODIFY","food_name":"cleaned up name","estimated_macros":{"calories":0,"protein":0,"carbs":0,"fat":0},"serving_size":"what you assumed","reasoning":"1-2 sentences, direct like a coach","suggestion":"concrete alternative if NO/MODIFY, else empty string"}`;

    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 500, messages: [{ role: "user", content: prompt }] }) });
      if (!r.ok) throw new Error("API " + r.status);
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      const txt = d.content.filter(i => i.type === "text").map(i => i.text).join("").replace(/```json|```/g, "").trim();
      const jsonMatch = txt.match(/\{[\s\S]*\}/);
      const p = JSON.parse(jsonMatch ? jsonMatch[0] : txt);
      setResp(p); setPending(p);
    } catch {
      // API failed — fall back to local DB
      const match = fuzzyMatch(input.trim());
      if (match) {
        const macros = { calories: match.calories, protein: match.protein, carbs: match.carbs, fat: match.fat };
        const v = getVerdict(macros, remaining, mealsLeft);
        const r = { verdict: v.verdict, food_name: match.name.charAt(0).toUpperCase() + match.name.slice(1), estimated_macros: macros, serving_size: match.serving, reasoning: v.reasoning, suggestion: v.suggestion };
        setResp(r); setPending(r);
      } else {
        // Nothing matched — rough estimate
        const fallback = { calories: 500, protein: 20, carbs: 45, fat: 22 };
        const v = getVerdict(fallback, remaining, mealsLeft);
        setResp({ verdict: v.verdict, food_name: input.trim(), estimated_macros: fallback, serving_size: "Rough estimate — couldn't look this up. Adjust before logging.", reasoning: "Estimated ~500 cal. " + v.reasoning, suggestion: v.suggestion });
        setPending({ verdict: v.verdict, food_name: input.trim(), estimated_macros: fallback, serving_size: "Rough estimate", reasoning: v.reasoning, suggestion: v.suggestion });
      }
    }
    setLoading(false);
  };

  const confirm = () => { if (!pending) return; setLogged([...logged, { name: pending.food_name, ...pending.estimated_macros, time: new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }), meal: MEAL_WINDOWS[mwi].name }]); setResp(null); setPending(null); setInput(""); ref.current?.focus(); };
  const dismiss = () => { setResp(null); setPending(null); setInput(""); ref.current?.focus(); };

  // Smart meal suggestions based on remaining macros
  const getSuggestions = async () => {
    setSugLoading(true);
    setSuggestions(null);
    const mw = MEAL_WINDOWS[mwi];
    const calPerMeal = Math.round(remaining.calories / Math.max(mealsLeft, 1));
    const protPerMeal = Math.round(remaining.protein / Math.max(mealsLeft, 1));

    // Build smart local suggestions from DB
    const scored = DB.map(item => {
      const calFit = 1 - Math.abs(item.c - calPerMeal) / calPerMeal;
      const protRatio = item.p / (item.c || 1);
      const protBonus = remaining.protein > 80 ? protRatio * 3 : protRatio;
      return { ...item, score: calFit + protBonus };
    }).filter(item => item.c <= remaining.calories + 50 && item.c >= 100).sort((a, b) => b.score - a.score);

    // Pick diverse suggestions
    const picks = [];
    const usedCats = new Set();
    for (const item of scored) {
      const name = item.k[0];
      const cat = name.includes("chicken") ? "chicken" : name.includes("steak") ? "beef" : name.includes("salmon") ? "fish" : name.includes("egg") ? "breakfast" : name.includes("protein") ? "supplement" : name.includes("salad") ? "salad" : name;
      if (!usedCats.has(cat) || picks.length < 3) {
        picks.push(item);
        usedCats.add(cat);
      }
      if (picks.length >= 5) break;
    }

    // Also try API for more creative suggestions
    const prompt = `Sports nutrition coach for a 264lb former D1 DT cutting to 235. It's ${mw.name} (${mw.desc}), ${mealsLeft} meals left today. Remaining: ${remaining.calories}cal / ${remaining.protein}gP / ${remaining.carbs}gC / ${remaining.fat}gF. Target ~${calPerMeal} cal and ~${protPerMeal}g protein per remaining meal. Suggest 3 specific, realistic meals — include both homemade and restaurant/fast food options. Be specific (not just "grilled chicken"). Respond ONLY JSON array: [{"name":"","calories":0,"protein":0,"carbs":0,"fat":0,"why":"1 sentence reason"}]`;

    let aiPicks = [];
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 500, messages: [{ role: "user", content: prompt }] }) });
      if (r.ok) {
        const d = await r.json();
        if (!d.error) {
          const txt = d.content.filter(i => i.type === "text").map(i => i.text).join("").replace(/```json|```/g, "").trim();
          const m = txt.match(/\[[\s\S]*\]/);
          if (m) aiPicks = JSON.parse(m[0]);
        }
      }
    } catch {}

    // Combine: AI picks first if available, then local picks
    const allSuggestions = [];
    for (const ai of aiPicks) {
      allSuggestions.push({ name: ai.name, calories: ai.calories, protein: ai.protein, carbs: ai.carbs, fat: ai.fat, why: ai.why, source: "ai" });
    }
    for (const local of picks.slice(0, aiPicks.length > 0 ? 2 : 5)) {
      allSuggestions.push({ name: local.k[0].charAt(0).toUpperCase() + local.k[0].slice(1), calories: local.c, protein: local.p, carbs: local.cb, fat: local.f, why: local.s, source: "db" });
    }

    setSuggestions(allSuggestions.slice(0, 5));
    setSugLoading(false);
  };

  const submitFoodRequest = () => {
    if (!requestInput.trim()) return;
    setRequestedFoods([...requestedFoods, { food: requestInput.trim(), time: new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }) }]);
    setRequestInput("");
  };

  const pct = (v, t) => Math.min(100, (v / t) * 100);
  const vc = resp?.verdict === "YES" ? "#4ade80" : resp?.verdict === "NO" ? "#f87171" : "#fbbf24";

  const S = { bg: "#0a0a0a", sf: "#141414", sf2: "#1c1c1c", bd: "#2a2a2a", tx: "#e8e8e8", dm: "#888", mt: "#555", ac: "#c4f542" };

  return (
    <div style={{ background: S.bg, minHeight: "100vh", color: S.tx, fontFamily: "'Source Sans 3','Segoe UI',sans-serif" }}>
      <div style={{ maxWidth: 720, margin: "0 auto", padding: "20px 16px 80px" }}>

        <div style={{ textAlign: "center", paddingBottom: 20, borderBottom: `1px solid ${S.bd}`, marginBottom: 20 }}>
          <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 11, letterSpacing: 4, textTransform: "uppercase", color: S.ac, marginBottom: 6 }}>Daily Fuel Check</div>
          <h1 style={{ fontFamily: "'Oswald',sans-serif", fontSize: 30, fontWeight: 700, textTransform: "uppercase", letterSpacing: 2, margin: 0 }}>Nutrition Tracker</h1>
          <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 12 }}>
            {Object.keys(PHASE_INFO).map(p => (
              <button key={p} onClick={() => setPhase(p)} style={{ background: phase === p ? S.ac : S.sf2, color: phase === p ? S.bg : S.dm, border: `1px solid ${phase === p ? S.ac : S.bd}`, borderRadius: 6, padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer", letterSpacing: 0.5 }}>{PHASE_INFO[p].label}</button>
            ))}
          </div>
        </div>

        {/* Macros */}
        <div style={{ background: S.sf, border: `1px solid ${S.bd}`, borderRadius: 12, padding: 16, marginBottom: 16 }}>
          <div style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
              <span style={{ fontFamily: "'Oswald',sans-serif", fontSize: 14, letterSpacing: 2, textTransform: "uppercase", color: S.ac }}>Calories</span>
              <span style={{ fontFamily: "'Oswald',sans-serif", fontSize: 22, fontWeight: 700 }}>{Math.round(totals.calories)} <span style={{ fontSize: 13, color: S.mt, fontWeight: 400 }}>/ {targets.calories}</span></span>
            </div>
            <div style={{ height: 10, background: S.sf2, borderRadius: 5, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${pct(totals.calories, targets.calories)}%`, background: pct(totals.calories, targets.calories) > 100 ? "#f87171" : S.ac, borderRadius: 5, transition: "width 0.5s" }} />

          </div>
          <div style={{ display: "flex", gap: 12 }}>

                <div style={{ fontSize: 11, color: S.dm, marginTop: 3, textAlign: "center" }}>{Math.round(m.v)}g / {m.t}g</div>
              </div>
            ))}
          </div>
        </div>

        {/* Meal Window */}
        <div style={{ background: S.sf, border: `1px solid ${S.bd}`, borderRadius: 10, padding: "10px 14px", marginBottom: 16, display: "flex", alignItems: "center", gap: 10 }}>

        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          <input ref={ref} value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && !loading && analyze()} placeholder="Chicken parm, Starbucks latte, Chipotle bowl..." style={{ flex: 1, background: S.sf2, border: `1px solid ${S.bd}`, borderRadius: 10, padding: "14px 16px", color: S.tx, fontSize: 15, outline: "none", fontFamily: "inherit" }} />
          <button onClick={analyze} disabled={loading || !input.trim()} style={{ background: loading ? S.bd : S.ac, color: S.bg, border: "none", borderRadius: 10, padding: "14px 20px", fontWeight: 700, fontSize: 14, cursor: loading ? "wait" : "pointer", fontFamily: "'Oswald',sans-serif", letterSpacing: 1, textTransform: "uppercase", opacity: !input.trim() ? 0.4 : 1, whiteSpace: "nowrap" }}>{loading ? "..." : "Check"}</button>
        </div>

        {/* Quick Chips */}
        {!resp && !loading && (
          <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
            {["Chicken parm sandwich", "Grande caramel macchiato", "Chipotle bowl", "Chick-fil-A meal", "Protein shake", "Cookout tray", "Couple slices of pizza", "Wings from Bdubs", "Eggs and bacon", "Greek yogurt", "A couple beers", "Acai bowl"].map(c => (
              <button key={c} onClick={() => setInput(c)} style={{ background: S.sf2, border: `1px solid ${S.bd}`, borderRadius: 20, padding: "6px 12px", fontSize: 12, color: S.dm, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "inherit" }}>{c}</button>
            ))}
          </div>
        )}

        {/* Result */}
        {resp && resp.verdict !== "ERROR" && (
          <div style={{ background: S.sf, border: `1px solid ${vc}44`, borderRadius: 12, padding: 16, marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 18, fontWeight: 700, color: vc, letterSpacing: 2 }}>{resp.verdict === "YES" ? "✅ YES" : resp.verdict === "NO" ? "🚫 NO" : "⚠️ MODIFY"}</div>
              <div style={{ flex: 1, fontSize: 15, fontWeight: 600 }}>{resp.food_name}</div>
            </div>
            <div style={{ display: "flex", gap: 16, marginBottom: 10, flexWrap: "wrap" }}>
              {[{ l: "Cal", v: resp.estimated_macros.calories, co: S.ac }, { l: "P", v: resp.estimated_macros.protein + "g", co: "#4da6ff" }, { l: "C", v: resp.estimated_macros.carbs + "g", co: "#fbbf24" }, { l: "F", v: resp.estimated_macros.fat + "g", co: "#b388ff" }].map(m => (
                <div key={m.l} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: S.mt, textTransform: "uppercase", letterSpacing: 1 }}>{m.l}</div>
                  <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 16, color: m.co, fontWeight: 600 }}>{m.v}</div>
                </div>
              ))}
              <div style={{ textAlign: "center", flex: 1, minWidth: 100 }}>
                <div style={{ fontSize: 10, color: S.mt, textTransform: "uppercase", letterSpacing: 1 }}>Serving</div>
                <div style={{ fontSize: 12, color: "#aaa", lineHeight: 1.3, marginTop: 2 }}>{resp.serving_size}</div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: "#ccc", lineHeight: 1.5, marginBottom: resp.suggestion ? 8 : 12 }}>{resp.reasoning}</div>
            {resp.suggestion && <div style={{ fontSize: 13, color: "#fbbf24", lineHeight: 1.5, marginBottom: 12, padding: "8px 10px", background: "#1a1805", borderRadius: 6, border: "1px solid #3a2e10" }}>💡 {resp.suggestion}</div>}
            <div style={{ display: "flex", gap: 8 }}>
              {(resp.verdict === "YES" || resp.verdict === "MODIFY") && <button onClick={confirm} style={{ flex: 1, background: S.ac, color: S.bg, border: "none", borderRadius: 8, padding: 12, fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "'Oswald',sans-serif", letterSpacing: 1, textTransform: "uppercase" }}>Log It</button>}
              <button onClick={dismiss} style={{ flex: resp.verdict === "NO" ? 1 : 0, minWidth: 80, background: S.sf2, color: S.dm, border: `1px solid ${S.bd}`, borderRadius: 8, padding: 12, fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "'Oswald',sans-serif", letterSpacing: 1, textTransform: "uppercase" }}>{resp.verdict === "NO" ? "Try Something Else" : "Skip"}</button>
            </div>
          </div>
        )}

        {resp?.verdict === "ERROR" && <div style={{ background: S.sf2, border: "1px solid #333", borderRadius: 10, padding: 14, marginBottom: 16, fontSize: 13, color: "#f87171" }}>{resp.reasoning}</div>}

        {/* Log */}
        {logged.length > 0 && (
          <div style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 12, letterSpacing: 3, textTransform: "uppercase", color: S.mt }}>Today's Log</div>
              <button onClick={() => { setLogged([]); setResp(null); setPending(null); setInput(""); }} style={{ background: "none", border: "none", color: "#f87171", fontSize: 11, cursor: "pointer", fontWeight: 600, letterSpacing: 1, textTransform: "uppercase" }}>Clear All</button>
            </div>
            {logged.map((f, i) => (
              <div key={i} style={{ background: S.sf, border: `1px solid ${S.bd}`, borderRadius: 8, padding: "10px 14px", marginBottom: 4, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 500 }}>{f.name}</div>
                  <div style={{ fontSize: 11, color: S.dm, marginTop: 2 }}>{f.meal} · {f.time} · {f.calories} cal · {f.protein}g P · {f.carbs}g C · {f.fat}g F</div>
                </div>
                <button onClick={() => setLogged(logged.filter((_, j) => j !== i))} style={{ background: "none", border: "none", color: S.mt, fontSize: 18, cursor: "pointer", padding: "0 4px" }}>×</button>
              </div>
            ))}
          </div>
        )}

        {/* Template */}

        {/* What Should I Eat? */}
        <div style={{ background: S.sf, border: `1px solid ${S.bd}`, borderRadius: 12, padding: 16, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: suggestions ? 12 : 0 }}>
            <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 12, letterSpacing: 3, textTransform: "uppercase", color: "#4da6ff" }}>What Should I Eat?</div>
            <button onClick={getSuggestions} disabled={sugLoading} style={{ background: "#4da6ff", color: S.bg, border: "none", borderRadius: 6, padding: "8px 16px", fontWeight: 700, fontSize: 12, cursor: sugLoading ? "wait" : "pointer", fontFamily: "'Oswald',sans-serif", letterSpacing: 1, textTransform: "uppercase", opacity: sugLoading ? 0.5 : 1 }}>{sugLoading ? "Thinking..." : suggestions ? "Refresh" : "Suggest Meals"}</button>
          </div>
          {!suggestions && !sugLoading && (
            <div style={{ fontSize: 12, color: S.mt, marginTop: 8 }}>Tap to get meal ideas that fit your remaining {Math.round(remaining.calories)} cal / {Math.round(remaining.protein)}g protein.</div>
          )}
          {suggestions && (
            <div>
              <div style={{ fontSize: 11, color: S.dm, marginBottom: 10 }}>Based on {Math.round(remaining.calories)} cal & {Math.round(remaining.protein)}g protein remaining across {mealsLeft} meals:</div>
              {suggestions.map((s, i) => (
                <div key={i} style={{ background: S.sf2, border: `1px solid ${S.bd}`, borderRadius: 8, padding: "10px 14px", marginBottom: 6, cursor: "pointer", transition: "border-color 0.2s" }}
                  onClick={() => { setInput(s.name); setSuggestions(null); ref.current?.focus(); }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontSize: 14, fontWeight: 600 }}>{s.name}</div>
                    <div style={{ fontSize: 12, color: S.ac, fontFamily: "'Oswald',sans-serif", whiteSpace: "nowrap" }}>{s.calories} cal</div>
                  </div>
                  <div style={{ display: "flex", gap: 12, marginTop: 4 }}>
                    <span style={{ fontSize: 11, color: "#4da6ff" }}>{s.protein}g P</span>
                    <span style={{ fontSize: 11, color: "#fbbf24" }}>{s.carbs}g C</span>
                    <span style={{ fontSize: 11, color: "#b388ff" }}>{s.fat}g F</span>
                  </div>
                  <div style={{ fontSize: 11, color: S.mt, marginTop: 4, fontStyle: "italic" }}>{s.why}</div>
                </div>
              ))}
              <div style={{ fontSize: 10, color: S.mt, marginTop: 6, textAlign: "center" }}>Tap any suggestion to check it</div>
            </div>
          )}
        </div>

        {/* Request Missing Food */}
        <div style={{ background: S.sf, border: `1px solid ${S.bd}`, borderRadius: 12, padding: 16, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }} onClick={() => setShowRequest(!showRequest)}>
            <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 12, letterSpacing: 3, textTransform: "uppercase", color: "#ff9f43" }}>Request a Food</div>
            <span style={{ color: S.dm, fontSize: 14 }}>{showRequest ? "▲" : "▼"}</span>
          </div>
          {showRequest && (
            <div style={{ marginTop: 12 }}>
              <div style={{ fontSize: 12, color: S.mt, marginBottom: 8 }}>Can't find something? Submit it here and it'll be added to the database.</div>
              <div style={{ display: "flex", gap: 8 }}>
                <input value={requestInput} onChange={e => setRequestInput(e.target.value)} onKeyDown={e => e.key === "Enter" && submitFoodRequest()} placeholder="e.g. Cookout milkshake, Bojangles supreme combo..." style={{ flex: 1, background: S.sf2, border: `1px solid ${S.bd}`, borderRadius: 8, padding: "10px 12px", color: S.tx, fontSize: 13, outline: "none", fontFamily: "inherit" }} />
                <button onClick={submitFoodRequest} disabled={!requestInput.trim()} style={{ background: "#ff9f43", color: S.bg, border: "none", borderRadius: 8, padding: "10px 14px", fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "'Oswald',sans-serif", letterSpacing: 1, textTransform: "uppercase", opacity: !requestInput.trim() ? 0.4 : 1 }}>Send</button>
              </div>
              {requestedFoods.length > 0 && (
                <div style={{ marginTop: 10 }}>
                  <div style={{ fontSize: 10, color: S.mt, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Submitted</div>
                  {requestedFoods.map((r, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 0", borderTop: i > 0 ? `1px solid ${S.bd}` : "none" }}>
                      <span style={{ fontSize: 13, color: S.dm }}>✓ {r.food}</span>
                      <span style={{ fontSize: 10, color: S.mt }}>{r.time}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>

        {/* Daily Template */}
        <div style={{ background: S.sf, border: `1px solid ${S.bd}`, borderRadius: 12, padding: 16 }}>
          <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 12, letterSpacing: 3, textTransform: "uppercase", color: S.ac, marginBottom: 12 }}>Daily Template — {targets.calories} Cal</div>
          {MEAL_WINDOWS.map((m, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderTop: i > 0 ? `1px solid ${S.sf2}` : "none", opacity: mwi > i ? 0.4 : 1 }}>
              <span style={{ fontSize: 18, width: 28, textAlign: "center" }}>{m.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: mwi === i ? 700 : 400, color: mwi === i ? S.ac : S.tx }}>{m.name} {mwi === i && "← NOW"}</div>
                <div style={{ fontSize: 11, color: S.mt }}>{m.time} — {m.desc}</div>
              </div>
              <div style={{ fontSize: 12, color: S.mt }}>~{Math.round(targets.calories / 5)} cal</div>
            </div>
          ))}
          <div style={{ marginTop: 12, fontSize: 12, color: S.mt, lineHeight: 1.6 }}>
            <strong style={{ color: S.dm }}>Macro split:</strong> ~215g protein · ~190g carbs · ~75g fat<br />
            <strong style={{ color: S.dm }}>Priority:</strong> Front-load protein. Carbs around training. Fats spread evenly.
          </div>
        </div>
      </div>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap'); input::placeholder{color:#555;}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(NutritionTracker));
</script>
</body>
</html>
